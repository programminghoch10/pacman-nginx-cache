server {
    listen 80;
    server_name _;
    root /var/www/cache;
    
    autoindex on;
    proxy_buffering off;

    location ~ \.(db|sig|files)$ {
        return 404;
    }

    location ~ \.tar\.(xz|zst)$ {
        try_files $uri @upstream;
    }

    location @upstream {
        proxy_store on;
        proxy_store_access user:rw group:rw all:r;
        proxy_redirect off;
        proxy_next_upstream error timeout http_404;
        proxy_pass http://$repo/$request_uri;
    }
}

map $request_uri $repo {
    default "";
    ~^/(.+)/os/[^/]+ $1;
}
